name: .NET CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/*, chore/*, fix/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --no-restore --configuration Release --verbosity normal

    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TravelRequestsDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults

  # Job 2: Security Analysis
  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install security tools
      run: |
        dotnet tool install --global security-scan
        dotnet tool install --global dotnet-outdated

    - name: Run security scan
      run: |
        dotnet list package --vulnerable --include-transitive
        dotnet outdated --fail-on-updates

    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\|secret\|key" --include="*.cs" --include="*.json" --include="*.yml" --include="*.yaml" . | grep -v "YourStrong@Passw0rd" | grep -v "supersecretkey"; then
          echo "Potential hardcoded secrets found!"
          exit 1
        fi

  # Job 3: Code Quality Analysis
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install code analysis tools
      run: |
        dotnet tool install --global dotnet-format
        dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic

    - name: Run code analysis
      run: dotnet build --configuration Release --verbosity normal /p:RunAnalyzersDuringBuild=true /p:EnableNETAnalyzers=true

  # Job 4: Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -f src/TravelRequests.Api/Dockerfile -t travelrequests-api:test .

    - name: Test Docker image
      run: |
        docker run --rm travelrequests-api:test dotnet --version

  # Job 5: Database Migration Test
  migration-test:
    name: Database Migration Test
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Express
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef

    - name: Wait for SQL Server
      run: |
        timeout 60 bash -c 'until /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "SELECT 1"; do sleep 2; done'

    - name: Create database
      run: |
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q "CREATE DATABASE TravelRequestsDb;"
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TravelRequestsDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true"

    - name: Run migrations
      run: dotnet ef database update --project src/TravelRequests.Infrastructure --startup-project src/TravelRequests.Api
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TravelRequestsDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true"

  # Job 6: API Documentation Check
  api-docs:
    name: API Documentation Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build with XML documentation
      run: dotnet build src/TravelRequests.Api/TravelRequests.Api.csproj --configuration Release /p:GenerateDocumentationFile=true

    - name: Check for missing XML documentation
      run: |
        if ! find src -name "*.cs" -exec grep -L "/// <summary>" {} \; | grep -v "Program.cs" | grep -v "GlobalUsings.cs" | head -5; then
          echo "All public APIs have XML documentation"
        else
          echo "Some public APIs are missing XML documentation"
          find src -name "*.cs" -exec grep -L "/// <summary>" {} \; | grep -v "Program.cs" | grep -v "GlobalUsings.cs" | head -5
        fi

  # Job 7: Performance Test
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install performance tools
      run: dotnet tool install --global dotnet-counters

    - name: Run performance analysis
      run: |
        echo "Performance analysis would run here"
        echo "This could include load testing, memory profiling, etc."

  # Job 8: Deployment Preview (for main branch)
  deployment-preview:
    name: Deployment Preview
    runs-on: ubuntu-latest
    needs: [build-and-test, security-analysis, code-quality, docker-build, migration-test, api-docs]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image for production
      run: |
        docker build -f src/TravelRequests.Api/Dockerfile -t travelrequests-api:latest .

    - name: Test production image
      run: |
        echo "Production deployment test would run here"
        echo "This could include smoke tests, health checks, etc."

  # Job 9: Notify Results
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [build-and-test, security-analysis, code-quality, docker-build, migration-test, api-docs]
    if: always()

    steps:
    - name: Notify Success
      if: needs.build-and-test.result == 'success' && needs.security-analysis.result == 'success' && needs.code-quality.result == 'success'
      run: |
        echo "✅ All checks passed successfully!"
        echo "🚀 Ready for deployment"

    - name: Notify Failure
      if: needs.build-and-test.result == 'failure' || needs.security-analysis.result == 'failure' || needs.code-quality.result == 'failure'
      run: |
        echo "❌ Some checks failed!"
        echo "Please review the failed jobs and fix the issues"
